const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function keyFromPassword(pw) {
  const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256"},
    mat, {name:"AES-GCM", length:256}, true, ["decrypt"]);
}
async function tryDecrypt(key) {
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(NONCE)}, key, b64(DATA));
  const html = new TextDecoder().decode(plain);
  document.open(); document.write(html); document.close();
}
async function boot() {
  const saved = localStorage.getItem("boardai-key");
  if (saved) {
    try {
      const key = await crypto.subtle.importKey("raw", b64(saved), "AES-GCM", false, ["decrypt"]);
      await tryDecrypt(key); return;
    } catch (e) { localStorage.removeItem("boardai-key"); }
  }
  document.getElementById("gate").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    try {
      const key = await keyFromPassword(document.getElementById("pw").value);
      const raw = await crypto.subtle.exportKey("raw", key);
      await tryDecrypt(key);
      localStorage.setItem("boardai-key", btoa(String.fromCharCode(...new Uint8Array(raw))));
    } catch (e) {
      document.getElementById("err").textContent = "Wrong password — try again.";
    }
  });
}
