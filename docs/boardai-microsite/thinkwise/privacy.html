const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function keyFromPassword(pw) {
  const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256"},

}
async function tryDecrypt(key) {

async function boot() {

      await tryDecrypt(key); return;
    } catch (e) { localStorage.removeItem("boardai-key"); }

    try {

      await tryDecrypt(key);
      localStorage.setItem("boardai-key", btoa(String.fromCharCode(...new Uint8Array(raw))));
